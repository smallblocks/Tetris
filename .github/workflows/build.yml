name: Build s9pk

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install start-cli
        run: |
          curl -L -o /tmp/start-cli.tar.gz https://github.com/smallblocks/staticrypt-startos/releases/download/tools-v1/start-cli-linux-x86_64.tar.gz
          sudo tar -xzf /tmp/start-cli.tar.gz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/start-cli
          sudo apt-get update && sudo apt-get install -y squashfs-tools-ng

      - name: Build Docker image
        run: |
          docker build -t localhost/tetris:latest .

      - name: Package s9pk
        run: |
          start-cli pack

      - name: Upload s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-s9pk
          path: "*.s9pk"
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: "*.s9pk"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
